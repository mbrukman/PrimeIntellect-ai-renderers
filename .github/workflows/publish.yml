name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. renderers-v0.1.6)'
        required: true
        type: string
  push:
    tags:
      - "renderers-v*"

jobs:
  # Build (no OIDC) → publish (OIDC only). The build job runs uv build with
  # contents: read only so a poisoned build-time dep cannot mint the OIDC
  # token. The publish job has id-token: write and the pypi-prod environment
  # but no source checkout — it only downloads the prebuilt artifact and runs
  # the SHA-pinned pypa publish action.
  build:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/renderers-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tagged release (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Checkout tagged release (push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSHED_REF: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$PUSHED_REF"
          fi

          # The package version is derived from this tag by hatch-vcs
          # at build time (see [tool.hatch.version] in pyproject.toml).
          # We only need to validate the tag shape — there's no
          # ``project.version`` field to cross-check anymore.
          case "$TAG" in
            renderers-v*) ;;
            *)
              echo "Release tags must be prefixed with 'renderers-v' (received '$TAG')" >&2
              exit 1
              ;;
          esac

      - uses: astral-sh/setup-uv@v7

      - name: Build renderers
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-prod
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
