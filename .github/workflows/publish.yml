name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. renderers-v0.1.6)'
        required: true
        type: string
  push:
    tags:
      - "renderers-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged release (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Checkout tagged release (push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSHED_REF: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$PUSHED_REF"
          fi

          # The package version is derived from this tag by hatch-vcs
          # at build time (see [tool.hatch.version] in pyproject.toml).
          # We only need to validate the tag shape — there's no
          # ``project.version`` field to cross-check anymore.
          case "$TAG" in
            renderers-v*) ;;
            *)
              echo "Release tags must be prefixed with 'renderers-v' (received '$TAG')" >&2
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@v7

      - name: Build renderers
        run: uv build

      - name: Publish to PyPI
        env:
          PYPI_RENDERERS_TOKEN: ${{ secrets.PYPI_RENDERERS_TOKEN }}
        run: uv publish --token "$PYPI_RENDERERS_TOKEN" dist/*
